<!DOCTYPE html>

<head>

</head>

<body>

<h1>Cailewey</h1>
<p>Selecciona el servicio que necesitas</p>

<div class="card">
<h3>Gasolina</h3>
<p>2 litros de gasolina</p>
<button>Solicitar</button>
</div>

<div class="card">
<h3>Cambio de llanta</h3>
<p>Ayuda con llanta ponchada</p>
<button>Solicitar</button>
</div>

<div class="card">
<h3>Paso de corriente</h3>
<p>Batería descargada</p>
<button>Solicitar</button>
</div>

<div class="card">
<h3>Aceite</h3>
<p>1 o 2 litros de aceite</p>
<button>Solicitar</button>
</div>

<div class="card">
<h3>Remolque</h3>
<p>Traslado a taller cercano</p>
<button>Solicitar</button>
</div>

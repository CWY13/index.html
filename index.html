<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cailewey Asistencia Vial</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

header{
background:#ff6600;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

input,select,button{
width:90%;
padding:12px;
margin:8px;
border:none;
border-radius:6px;
font-size:16px;
}

button{
background:#ff6600;
color:white;
font-weight:bold;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>
Cailewey Asistencia Vial para Motocicletas
</header>

<div class="container">

<!-- LOGIN -->

<div id="login">

<h2>Iniciar sesión</h2>

<input id="loginTelefono" placeholder="Telefono">
<input id="loginPassword" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

<br><br>

<button onclick="mostrarRegistro()">Crear Cuenta</button>
<button onclick="mostrarRecuperar()">Olvidé contraseña</button>

</div>

<!-- REGISTRO -->

<div id="registro" class="hidden">

<h2>Registro</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Telefono">
<input id="password" type="password" placeholder="Contraseña">

<select id="plan">

<option>Plan 125 ($50 mensual)</option>
<option>Plan 150 ($75 mensual)</option>
<option>Plan 250 ($95 mensual)</option>

</select>

<button onclick="registrar()">Registrar</button>
<button onclick="volver()">Volver</button>

</div>

<!-- RECUPERAR -->

<div id="recuperar" class="hidden">

<h2>Recuperar contraseña</h2>

<input id="telefonoRecuperar" placeholder="Telefono">
<input id="nuevoPassword" type="password" placeholder="Nueva contraseña">

<button onclick="recuperar()">Cambiar contraseña</button>
<button onclick="volver()">Volver</button>

</div>

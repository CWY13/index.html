<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cailewey - Asistencia Vial</title>
    <style>
        :root { --rojo: #d32f2f; --gris: #f4f4f4; }
        body { font-family: sans-serif; background: var(--gris); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--rojo); text-align: center; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-main { width: 100%; padding: 14px; background: var(--rojo); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-outline { width: 100%; padding: 14px; background: none; border: 1px solid var(--rojo); color: var(--rojo); border-radius: 10px; margin-top: 10px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color:var(--rojo); margin-bottom:0;">🏍️ Cailewey</h1>
    <p style="font-size:12px; color:#666; margin-bottom:20px;">Asistencia Vial Tlajomulco</p>

    <div id="register-box">
        <h3>Nuevo Registro</h3>
        <form action="https://script.google.com/macros/s/AKfycbxgwpebtef9b0yTsC4XUfIhvHayqRNuAw4gerkBuS2Gf9kLbrQPB3GKi3ggg13x0LtG/exec" method="POST">
            <div class="input-group">
                <label>Nombre Completo</label>
                <input type="text" name="nombre" placeholder="Ej. Juan Pérez" required>
            </div>
            <div class="input-group">
                <label>Teléfono (WhatsApp)</label>
                <input type="tel" name="telefono" placeholder="33XXXXXXXX" required>
            </div>
            
            <div class="input-group">
                <label style="color:var(--rojo)">Crea tu Contraseña</label>
                <input type="password" name="password" placeholder="Mínimo 6 caracteres" required>
            </div>

            <div class="input-group">
                <label>Elige tu Plan</label>
                <select name="plan">
                    <option value="Plan 125 ($50)">Plan 125 - $50/mes</option>
                    <option value="Plan 150 ($75)">Plan 150 - $75/mes</option>
                    <option value="Plan 250 ($95)">Plan 250 - $95/mes</option>
                </select>
            </div>
            <button type="submit" class="btn-main">Registrarme y Pagar</button>
        </form>
    </div>
</div>

</body>
</html>

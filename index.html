<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cailewey - Asistencia Vial</title>
    <style>
        :root { --rojo: #d32f2f; --verde: #25d366; --gris: #f4f4f4; --blanco: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--gris); margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: var(--blanco); width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--rojo); text-align: center; box-sizing: border-box; }
        .hidden { display: none !important; }
        h1 { color: var(--rojo); margin: 0; font-size: 28px; }
        .subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .btn-main { background: var(--rojo); color: white; }
        .btn-outline { background: none; border: 1px solid var(--rojo); color: var(--rojo); }
        .btn-whatsapp { background: var(--verde); color: white; text-decoration: none; display: block; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 15px; }
        .opcion { text-align: left; background: #f9f9f9; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; cursor: pointer; border: 1px solid transparent; }
        .opcion:hover { border-color: var(--rojo); }
        .opcion input { width: auto; margin-right: 15px; transform: scale(1.4); }
        .status-badge { background: #e8f5e9; color: #2e7d32; padding: 8px; border-radius: 8px; font-weight: bold; font-size: 14px; margin: 15px 0; }
        .aviso { background: #fff9c4; border: 1px dashed #fbc02d; padding: 10px; border-radius: 8px; font-size: 13px; color: #616161; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>🏍️ Cailewey</h1>
    <p class="subtitle">Asistencia Vial Tlajomulco</p>

        <button class="btn-outline" onclick="ver('sec-registro')">Crear Cuenta Nueva</button>
        <p><a href="#" onclick="ver('sec-olvido')" style="font-size:13px; color:#1877f2; text-decoration:none;">¿Olvidaste tu contraseña?</a></p>
    </div>

        <h3>Nuevo Registro</h3>

            <input type="tel" name="telefono" placeholder="Teléfono (WhatsApp)" required>

                <option value="Plan 250">Plan 250 ($95/mes)</option>
            </select>
            <button type="submit" class="btn-main">Registrarme Ahora</button>

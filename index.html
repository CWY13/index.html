<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cailewey</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { background: white; width: 100%; max-width: 380px; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 6px solid #d32f2f; text-align: center; }
        .hidden { display: none !important; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #d32f2f; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn-verde { background: #25d366; text-decoration: none; display: block; padding: 15px; border-radius: 8px; color: white; margin-top: 20px; font-weight: bold; }
        .btn-volver { background: none; border: 1px solid #d32f2f; color: #d32f2f; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color:#d32f2f; margin:0;">🏍️ Cailewey</h1>
    <p style="color:#666; font-size:12px;">Asistencia Vial Tlajomulco</p>

    <div id="login-sec">
        <input type="text" id="u" placeholder="Teléfono (Usuario)">
        <input type="password" id="p" placeholder="Contraseña">
        <button onclick="entrar()">Entrar a mi Cuenta</button>
        <button class="btn-volver" onclick="ver('reg-sec')">Crear Cuenta Nueva</button>
        <p><a href="#" onclick="ver('forgot-sec')" style="font-size:12px; color:#666;">¿Olvidaste tu contraseña?</a></p>
    </div>

    <div id="reg-sec" class="hidden">
        <h3>Nuevo Registro</h3>
        <form action="https://script.google.com/macros/s/AKfycbxgwpebtef9b0yTsC4XUfIhvHayqRNuAw4gerkBuS2Gf9kLbrQPB3GKi3ggg13x0LtG/exec" method="POST">
            <input type="text" name="nombre" placeholder="Nombre completo" required>
            <input type="tel" name="telefono" placeholder="Teléfono" required>
            <input type="password" name="password" placeholder="Crea tu contraseña" required>
            <select name="plan" style="width:100%; padding:12px; border-radius:8px; margin:8px 0;">
                <option value="125">Plan 125 ($50)</option>
                <option value="150">Plan 150 ($75)</option>
                <option value="250">Plan 250 ($95)</option>
            </select>
            <button type="submit">Finalizar Registro</button>
        </form>
        <button class="btn-volver" onclick="ver('login-sec')">Volver</button>
    </div>

    <div id="forgot-sec" class="hidden">
        <h3>Recuperar Cuenta</h3>
        <p style="font-size:13px;">Ingresa tu número y te contactaremos.</p>
        <input type="tel" placeholder="Tu teléfono">
        <button onclick="window.location.href='https://wa.me/523319053634?text=Olvide%20mi%20clave'">Solicitar por WhatsApp</button>
        <button class="btn-volver" onclick="ver('login-sec')">Volver</button>
    </div>

    <div id="socio-sec" class="hidden">
        <h2 style="color:#d32f2f">¡Bienvenido!</h2>
        <div style="background:#e8f5e9; color:#2e7d32; padding:10px; border-radius:8px; font-weight:bold;">● ESTATUS: ACTIVO</div>
        <p style="text-align:left; font-size:14px; margin-top:15px;">🏁 Zona: Tlajomulco<br>⛽ Insumos: Activos<br>🚛 Remolque: Activo</p>
        <a href="https://wa.me/523319053634?text=Necesito%20asistencia" class="btn-verde">📲 PEDIR ASISTENCIA AHORA</a>
        <button class="btn-volver" onclick="location.reload()" style="margin-top:20px;">Cerrar Sesión</button>
    </div>
</div>

<script>
    function ver(id) {
        document.getElementById('login-sec').classList.add('hidden');
        document.getElementById('reg-sec').classList.add('hidden');
        document.getElementById('forgot-sec').classList.add('hidden');
        document.getElementById('socio-sec').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    function entrar() {
        var user = document.getElementById('u').value;
        var pass = document.getElementById('p').value;
        if(user !== "" && pass !== "") {
            ver('socio-sec');
        } else {
            alert("Escribe tus datos de acceso");
        }
    }
</script>

</body>
</html>

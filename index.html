<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cailewey - Asistencia Vial</title>
    <style>
        :root { --rojo: #d32f2f; --verde: #25d366; --gris: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--rojo); text-align: center; box-sizing: border-box; }
        .hidden { display: none !important; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button, .btn { width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; border: none; transition: 0.3s; margin-top: 10px; display: block; text-decoration: none; }
        .btn-main { background: var(--rojo); color: white; }
        .btn-outline { background: none; border: 1px solid var(--rojo); color: var(--rojo); }
        .btn-whatsapp { background: var(--verde); color: white; }
        .status-box { background: #e8f5e9; color: #2e7d32; padding: 12px; border-radius: 10px; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color:var(--rojo); margin-bottom:0;">🏍️ Cailewey</h1>
    <p style="font-size:12px; color:#666; margin-bottom:20px;">Asistencia Vial Tlajomulco</p>

    <div id="login-box">
        <div class="input-group">
            <label>Teléfono (Usuario)</label>
            <input type="text" id="userLogin" placeholder="33XXXXXXXX">
        </div>
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="passLogin" placeholder="••••••••">
        </div>
        <button class="btn-main" onclick="validarLogin()">Entrar a mi Cuenta</button>
        <p><a href="#" onclick="mostrar('forgot-box')" style="font-size:14px; color:#1877f2; text-decoration:none;">¿Olvidaste tu contraseña?</a></p>
        <button class="btn-outline" onclick="mostrar('register-box')">Crear Cuenta Nueva</button>
    </div>

    <div id="register-box" class="hidden">
        <h3>Nuevo Registro</h3>
        <form action="https://script.google.com/macros/s/AKfycbxgwpebtef9b0yTsC4XUfIhvHayqRNuAw4gerkBuS2Gf9kLbrQPB3GKi3ggg13x0LtG/exec" method="POST">
            <div class="input-group">
                <label>Nombre Completo</label>
                <input type="text" name="nombre" required>
            </div>
            <div class="input-group">
                <label>Teléfono</label>
                <input type="tel" name="telefono" required>
            </div>
            <div class="input-group">
                <label>Crea tu Contraseña</label>
                <input type="password" name="password" required>
            </div>
            <div class="input-group">
                <label>Elige tu Plan</label>
                <select name="plan">
                    <option value="Plan 125 ($50)">Plan 125 - $50/mes</option>
                    <option value="Plan 150 ($75)">Plan 150 - $75/mes</option>
                    <option value="Plan 250 ($95)">Plan 250 - $95/mes</option>
                </select>
            </div>
            <button type="submit" class="btn-main">Registrarme y Pagar</button>
        </form>
        <button class="btn-outline" onclick="mostrar('login-box')">Volver</button>
    </div>

    <div id="forgot-box" class="hidden">
        <h3>Recuperar Acceso</h3>
        <p style="font-size:13px;">Ingresa tu teléfono y te contactaremos por WhatsApp.</p>
        <div class="input-group">
            <label>Número de Teléfono</label>
            <input type="tel" id="telForgot">
        </div>
        <button class="btn-main" onclick="window.location.href='https://wa.me/523319053634?text=Olvide%20mi%20clave'">Solicitar por WhatsApp</button>
        <button class="btn-outline" onclick="mostrar('login-box')">Volver</button>
    </div>
